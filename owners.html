<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BackHome — List your home</title>
  <link rel="icon" type="image/svg+xml" href="logo.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-color: #F8F5F0;
      --text-dark: #2B2927;
      --text-muted: #736E67;
      --accent: #BFA582;
      --accent-light: #F4EFE8;
      --white: #FFFFFF;
      --border-color: #E6E1DA;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-color);
      color: var(--text-dark);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    a { text-decoration: none; color: inherit; }
    button, input, select, textarea { font-family: inherit; outline: none; }
    h1, h2, h3, h4 { font-weight: 700; letter-spacing: -0.02em; line-height: 1.15; }

    .section-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 16px;
    }

    /* ── NAVBAR ── */
    header { 
      padding: 30px 48px; 
      position: sticky;
      top: 0;
      z-index: 1000;
      background: var(--bg-color);
      transition: box-shadow 0.2s, padding 0.2s;
    }
    header.scrolled {
      padding: 15px 48px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.05);
      border-bottom: 1px solid var(--border-color);
    }
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      max-width: 1200px;
      margin: 0 auto;
    }

    .logo { display: inline-flex; align-items: center; gap: 8px; font-size: 22px; font-weight: 800; letter-spacing: -0.5px; transition: transform 0.2s; }
    .logo-icon { width: 32px; height: 32px; flex-shrink: 0; }
    .logo:hover { transform: translateY(-1px); }
    .logo span { color: var(--accent); }

    .nav-actions { display: flex; align-items: center; gap: 12px; }
    .btn-outline {
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 600;
      border-radius: 12px;
      border: 1px solid var(--border-color);
      color: var(--text-dark);
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }
    .btn-outline:hover { background: rgba(0,0,0,0.03); }

    /* ── LAYOUT ── */
    main {
      flex: 1;
      padding: 80px 40px 120px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .form-wrapper {
      width: 100%;
      max-width: 540px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 48px;
    }
    .page-title {
      font-size: 40px;
      font-weight: 800;
      color: var(--text-dark);
      margin-bottom: 16px;
    }
    .page-subtitle {
      font-size: 16px;
      color: var(--text-muted);
      line-height: 1.6;
    }

    /* ── FORM CARD ── */
    .form-card {
      background: var(--white);
      border-radius: 24px;
      padding: 48px 40px;
      border: 1px solid var(--border-color);
      box-shadow: 0 8px 32px rgba(0,0,0,0.02);
    }

    .form-group { margin-bottom: 24px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
    
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--text-muted);
    }

    .form-input {
      width: 100%;
      padding: 16px 20px;
      border-radius: 12px;
      font-size: 15px;
      background: var(--bg-color);
      border: 1px solid var(--border-color);
      color: var(--text-dark);
      transition: all 0.25s ease;
    }
    .form-input::placeholder { color: #AFAAA1; }
    .form-input:focus { 
      border-color: var(--accent); 
      background: var(--white);
      box-shadow: 0 0 0 4px rgba(191,165,130,0.1);
    }

    select.form-input {
      appearance: none; cursor: pointer;
      background-image: url("data:image/svg+xml,%3Csvg width='12' height='12' viewBox='0 0 24 24' fill='none' stroke='%23736E67' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M6 9l6 6 6-6'/%3E%3C/svg%3E");
      background-repeat: no-repeat; background-position: right 16px center; padding-right: 40px;
    }
    textarea.form-input { resize: vertical; min-height: 120px; }

    .btn-submit {
      width: 100%;
      padding: 16px 24px;
      background: var(--text-dark);
      border: 1px solid var(--text-dark);
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      color: var(--white);
      cursor: pointer;
      transition: all 0.25s ease;
      margin-top: 8px;
    }
    .btn-submit:hover {
      background: #3B3834;
      border-color: #3B3834;
      transform: translateY(-1px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.06);
    }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(120px);
      background: var(--text-dark);
      border: 1px solid var(--border-color);
      color: var(--white);
      padding: 16px 32px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: 600;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 999;
      box-shadow: 0 12px 40px rgba(0,0,0,0.15);
      white-space: nowrap;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── FOOTER ── */
    footer {
      background: var(--bg-color);
      color: var(--text-dark);
      padding: 60px 0 40px;
      border-top: 1px solid var(--border-color);
    }

    .footer-container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 40px;
    }
    .footer-top {
      text-align: center;
      margin-bottom: 40px;
    }
    .footer-bottom {
      border-top: 1px solid var(--border-color);
      padding-top: 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      color: var(--text-muted);
    }

    @media (max-width: 600px) {
      header { padding: 20px 24px; }
      main { padding: 40px 24px; }
      .form-card { padding: 32px 24px; border-radius: 20px; }
      .form-row { grid-template-columns: 1fr; gap: 24px; }
      .page-title { font-size: 32px; }
      .footer-bottom { flex-direction: column; gap: 12px; text-align: center; }
    }
  </style>
</head>
<body>

<div id="toast"></div>

<header>
  <nav>
    <a href="index.html" class="logo">
      <img src="logo.svg" alt="BackHome Logo" class="logo-icon">
      <span>Back</span><span>Home</span>
    </a>
    <div class="nav-actions">
      <a href="index.html" class="btn-outline">← Back to home</a>
    </div>
  </nav>
</header>

<main>
  <div class="form-wrapper">
    <div class="page-header">
      <div class="section-label">FOR OWNERS</div>
      <h1 class="page-title">List your home</h1>
      <p class="page-subtitle">Submit your property details and we'll be in touch shortly to get your home verified and listed.</p>
    </div>

    <div class="form-card">
      <form id="ownersForm" onsubmit="handleOwners(event)">
        
        <div class="form-row">
          <div class="form-group" style="margin-bottom: 0;">
            <label class="form-label" for="oName">Full name</label>
            <input type="text" id="oName" class="form-input" placeholder="Your name" required>
          </div>
          <div class="form-group" style="margin-bottom: 0;">
            <label class="form-label" for="oEmail">Email address</label>
            <input type="email" id="oEmail" class="form-input" placeholder="you@example.com" required>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="oCity">City</label>
          <select id="oCity" class="form-input" required>
            <option value="" disabled selected>— Select your city —</option>
            <option value="Mogadishu">Mogadishu</option>
            <option value="Hargeisa">Hargeisa</option>
            <option value="Garowe">Garowe</option>
            <option value="Kismayo">Kismayo</option>
            <option value="Galkayo">Galkayo</option>
            <option value="Bosaso">Bosaso</option>
          </select>
        </div>

        <div class="form-group">
          <label class="form-label" for="oDesc">Property description</label>
          <textarea id="oDesc" class="form-input" placeholder="Briefly describe your property (type, size, location, etc.)" required></textarea>
        </div>

        <button type="submit" class="btn-submit">Submit property</button>
      </form>
    </div>
  </div>
</main>

<footer>
  <div class="footer-container">
    <div class="footer-top">
      <a href="index.html" class="logo" style="display:inline-flex; align-items:center; gap:8px; font-size: 22px; font-weight: 800; text-decoration: none;">
        <img src="logo.svg" alt="BackHome Logo" class="logo-icon">
        <span>Back</span><span style="color: var(--accent);">Home</span>
      </a>
    </div>
    <div class="footer-bottom">
      <span>© 2026 BackHome. All rights reserved.</span>
      <span>Built for the diaspora.</span>
    </div>
  </div>
</footer>

<script>
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 4500);
  }

  function handleOwners(e) {
    e.preventDefault();
    showToast('Property submitted! We will be in touch shortly.');
    e.target.reset();
  }

  window.addEventListener('scroll', () => {
    const header = document.querySelector('header');
    if (window.scrollY > 10) {
      header.classList.add('scrolled');
    } else {
      header.classList.remove('scrolled');
    }
  });

</script>
</body>
</html>
